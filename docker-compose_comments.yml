version: '3'
services:
# add a worker service that will run our background jobs, this will be a separate container from our server and it will be a postgres database that will be used to store our data
  postgres:
    image: 'postgres:18-alpine'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: complex
# add a redis service that will be used to store our background jobs, this will be a separate container from our server and it will be a redis database that will be used as a message broker for our background jobs
  redis:
    image: 'redis:8-alpine' 
# add a server service that will run our server, this will be a separate container from our worker and it will be a node.js application that will be used to serve our API  
  server:
    build:
      # specify the dockerfile to use for the server image, this will be a separate dockerfile from the one we use for the worker image because we want to install different dependencies for the server and the worker
      # look for the Dockerfile.dev file in the server directory and all other files in that directory to build the server image, this will allow us to have a separate dockerfile for development and production environments, we can use the same dockerfile for both environments and just specify different build arguments to install different dependencies for development and production environments
      dockerfile: Dockerfile.dev
      # set the context to the server directory so that we can access the package.json and other files in that directory to build our server image
      context: ./server
    volumes:
      # mount the node_modules directory to the /app/node_modules directory in the container so that we can access our node modules and run our server code in the container, this will allow us to make changes to our server code and see the changes reflected in the container without having to rebuild the image every time we make a change
      - ./server:/app/node_modules
      # mount the server directory to the /app directory in the container so that we can access our server code and run it in the container, this will allow us to make changes to our server code and see the changes reflected in the container without having to rebuild the image every time we make a change
      - ./server:/app
      # specify that the server service depends on the postgres and redis services so that they will be started before the server service is started, this will ensure that the server can connect to the postgres and redis services when it starts up
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGUSER=postgres
      - PGHOST=postgres
      - PGDATABASE=postgres
      - PGPASSWORD=postgres_password
      - PGPORT=5432
  
  worker:
    build:
      dockerfile: Dockerfile.dev
      context: ./worker
    volumes:
      - /app/node_modules
      - ./worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  client:
    build:
      dockerfile: Dockerfile.dev
      context: ./client
    volumes:
      - /app/node_modules
      - ./client:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    
